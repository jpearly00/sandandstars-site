name: Site guardrail

# Runs the static site checker on every push / PR to main.
# Hard-fails only on missing critical assets (the og.jpg 404 class of regression).
# Broken links, oversized images, and em-dash voice violations surface as warnings.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run site guardrail
        run: python3 checks/site_check.py
